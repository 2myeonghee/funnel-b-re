<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>차액가맹금 신청</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#3B5CEB;--blue-dark:#2d46d4;
  --blue-inactive:#B2DFFF;--blue-bg:#F8FAFC;
  --blue-light:#EFF6FF;--text:#1F2937;--sub:#6B7280;--border:#E2E8F0;--red:#EF4444;
}
html,body{min-height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--blue-bg);color:var(--text);-webkit-font-smoothing:antialiased;}

.app{
  max-width:430px;margin:0 auto;
  min-height:100dvh;display:flex;flex-direction:column;
  padding:calc(env(safe-area-inset-top,0px) + 16px) 16px 0;
  gap:12px;
}

/* 점 인디케이터 */
.progress-header{display:flex;align-items:center;gap:8px;padding:4px 0;}
.step-dot{width:8px;height:8px;border-radius:50%;background:#DDE2E8;transition:all 0.3s;}
.step-dot.active{width:24px;border-radius:4px;background:var(--blue);}
.step-dot.done{background:var(--blue);opacity:0.5;}

/* 슬라이드 */
.slides-outer{flex:1;overflow:hidden;min-height:0;}
.slides-track{display:flex;height:100%;transition:transform 0.4s cubic-bezier(0.45,0.05,0.55,0.95);}
.slide{min-width:100%;height:100%;display:flex;flex-direction:column;gap:12px;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 20px);overflow-y:auto;}

/* 카드 */
.card{background:#fff;border-radius:20px;box-shadow:0 4px 24px rgba(59,92,235,0.08);padding:20px;}

/* 일러스트 — 원래 크기 유지 */
.illust-card{background:#fff;border-radius:20px;box-shadow:0 4px 24px rgba(59,92,235,0.08);overflow:hidden;}
.illust-wrap{display:flex;justify-content:center;padding:16px 0 0;}
.illust-wrap img{width:60%;display:block;border-radius:12px;}
/* 푸터 */
footer{background:#111;color:#999;font-size:10px;line-height:1.7;padding:12px 20px;text-align:center;max-width:430px;margin:0 auto;}
footer strong{color:#ddd;}
.illust-caption{padding:16px 20px;}
.illust-caption h2{font-size:18px;font-weight:900;letter-spacing:-0.4px;margin-bottom:4px;}
.illust-caption p{font-size:12px;color:var(--sub);line-height:1.5;}

/* 업로드 */
.upload-box{
  border:2px dashed #CBD5E1;border-radius:14px;min-height:100px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;cursor:pointer;transition:all 0.2s;padding:20px;text-align:center;background:#FDFEFE;
  margin-bottom:12px;
}
.upload-box.has-file{border-color:#22C55E;background:#F0FDF4;}
.upload-icon{width:40px;height:40px;background:var(--blue-light);border-radius:50%;display:flex;align-items:center;justify-content:center;}
.upload-box.has-file .upload-icon{background:#DCFCE7;}
.upload-label{font-size:13px;font-weight:700;color:#475569;}
.upload-box.has-file .upload-label{color:#166534;font-size:12px;word-break:break-all;}
input[type="file"]{display:none;}

/* 정보 입력 */
.card-header{margin-bottom:14px;}
.card-header h2{font-size:19px;font-weight:900;letter-spacing:-0.4px;margin-bottom:4px;}
.card-header p{font-size:12px;color:var(--sub);line-height:1.5;}
.notice-badge{display:flex;align-items:flex-start;gap:8px;background:var(--blue-light);border-radius:10px;padding:10px 12px;margin-bottom:14px;}
.notice-badge p{font-size:12px;color:#1d4ed8;line-height:1.5;font-weight:500;}
.form-group{margin-bottom:12px;}
.form-label{display:flex;align-items:center;gap:3px;font-size:12px;font-weight:700;margin-bottom:6px;}
.required{color:var(--red);}
.form-input{
  width:100%;padding:14px;border:1.5px solid var(--border);border-radius:12px;
  font-size:16px;font-family:inherit;color:var(--text);background:#fff;outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;-webkit-appearance:none;
}
.form-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,92,235,0.1);}
.form-input::placeholder{color:#CBD5E1;}

/* 버튼 — 카드/콘텐츠 바로 아래 */
.submit-btn{
  width:100%;padding:17px;border:none;border-radius:14px;
  font-size:17px;font-weight:700;font-family:inherit;
  background:var(--blue-inactive);color:white;
  pointer-events:none;transition:background 0.25s;
}
.submit-btn.active{background:var(--blue);pointer-events:auto;cursor:pointer;}
.submit-btn.active:active{background:var(--blue-dark);}

/* 완료 */
.complete-card{
  background:#fff;border-radius:20px;box-shadow:0 4px 24px rgba(59,92,235,0.08);
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 24px;text-align:center;gap:12px;min-height:300px;
}
.check-circle{width:80px;height:80px;background:var(--blue-light);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:4px;}
.complete-card h2{font-size:20px;font-weight:900;line-height:1.4;}
.complete-card p{font-size:13px;color:var(--sub);line-height:1.7;}
</style>
</head>

          <button class="submit-btn" id="submitBtn1" onclick="go()">다음으로</button>
        </div>
      </div>

      <!-- STEP 2 -->
      <div class="slide">
        <div class="card" style="flex:1;display:flex;flex-direction:column;">
          <div class="card-header">
            <h2>신청자 정보를<br>입력해주세요</h2>
            <p>서류 검토에 필요한 정보입니다.</p>
          </div>
          <div class="notice-badge">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="flex-shrink:0;margin-top:1px">
              <circle cx="12" cy="12" r="10" fill="#3B5CEB"/>
              <path d="M12 8v4M12 16h.01" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
            <p>본 신청은 미성년자와 외국인은 접수받지 않습니다.</p>
          </div>
          <div class="form-group">
            <label class="form-label">이름<span class="required">*</span></label>
            <input class="form-input" type="text" id="nameIn" placeholder="이름을 입력해주세요"
              autocomplete="name" enterkeyhint="next"
              oninput="chkForm()"
              onkeydown="if(event.key==='Enter'){event.preventDefault();document.getElementById('phoneIn').focus();}">
          </div>
          <div class="form-group">
            <label class="form-label">전화번호<span class="required">*</span></label>
            <input class="form-input" type="tel" id="phoneIn" placeholder="010-1234-5678"
              maxlength="13" inputmode="numeric" enterkeyhint="done"
              oninput="fmtPhone(this);chkForm()"
              onkeydown="if(event.key==='Enter'){event.preventDefault();if(document.getElementById('submitBtn2').classList.contains('active'))go();}">
          </div>
          <div style="flex:1;min-height:16px;"></div>
          <button class="submit-btn" id="submitBtn2" onclick="go()">제출하기</button>
        </div>
      </div>

      <!-- STEP 3 -->
      <div class="slide">
        <div class="complete-card">
          <div class="check-circle">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
              <path d="M5 13l4 4L19 7" stroke="#3B5CEB" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
          </div>
          <h2>신청이<br>완료되었습니다</h2>
          <p>검토 후 1~2 영업일 내로<br>법무법인에서 직접 연락드립니다.</p>
        </div>
      </div>

    </div>
  </div>

</div>

<footer>
  <strong>법무법인 더 에이치 황해</strong><br>
  사업자등록번호 : 121-81-78634 | 대표 천상현<br>
  주소 : 인천광역시 미추홀구 학익소로 60 | 전화 : 032-251-1000
</footer>

<script>
let step=1;
(function(){
  function onVV(){const f=document.activeElement;if(f&&f.tagName==='INPUT')setTimeout(()=>f.scrollIntoView({block:'center',behavior:'smooth'}),50);}
  if(window.visualViewport)window.visualViewport.addEventListener('resize',onVV);
})();
document.getElementById('fileInput').addEventListener('change',function(e){
  const f=e.target.files[0];if(!f)return;
  document.getElementById('uploadIcon').innerHTML=`<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="#22C55E"/><path d="M7 12.5l3.5 3.5 6-7" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>`;
  document.getElementById('uploadLabel').textContent=f.name.length>26?f.name.slice(0,24)+'…':f.name;
  document.getElementById('uploadBox').classList.add('has-file');
  document.getElementById('submitBtn1').classList.add('active');
});
function chkForm(){
  const n=document.getElementById('nameIn').value.trim().length>=2;
  const p=document.getElementById('phoneIn').value.replace(/-/g,'').length===11;
  const b=document.getElementById('submitBtn2');
  (n&&p)?b.classList.add('active'):b.classList.remove('active');
}
function fmtPhone(i){
  let v=i.value.replace(/\D/g,'');if(v.length>11)v=v.slice(0,11);
  if(v.length>=7)i.value=v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7);
  else if(v.length>=4)i.value=v.slice(0,3)+'-'+v.slice(3);else i.value=v;
}
function setDots(s){
  for(let i=1;i<=3;i++){const d=document.getElementById('dot'+i);d.className='step-dot';if(i<s)d.classList.add('done');else if(i===s)d.classList.add('active');}
}
function go(){
  document.activeElement&&document.activeElement.blur();
  if(step===1){step=2;document.getElementById('sTrack').style.transform='translateX(-100%)';setDots(2);setTimeout(()=>document.getElementById('nameIn').focus(),420);}
  else if(step===2){step=3;document.getElementById('sTrack').style.transform='translateX(-200%)';setDots(3);}
}
</script>
</body>
</html>
